<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a6fa8">
  <meta name="description" content="MAELSTROM - A pirate naval survivor game. Battle endless waves of enemy ships, build your fleet, and become the most feared captain on the high seas!">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="MAELSTROM - Pirate Naval Survivor">
  <meta property="og:description" content="Battle endless waves of enemy ships, build your fleet, and become the most feared captain on the high seas!">
  <meta property="og:image" content="/assets/preview.png">
  
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  
  <title>MAELSTROM - Pirate Naval Survivor</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1b2a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
    }
    
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }
    
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    #ui-layer > * {
      pointer-events: auto;
    }
    
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #1a3a52 0%, #0d1b2a 100%);
      color: white;
      z-index: 1000;
    }
    
    .loading-screen h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      letter-spacing: 0.2em;
    }
    
    .loading-screen .subtitle {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 2rem;
    }
    
    .loading-bar {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }
    
    .loading-text {
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    
    @media (max-width: 768px) {
      .loading-screen h1 {
        font-size: 2rem;
      }
      
      .loading-screen .subtitle {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-layer"></div>
    
    <div id="loading-screen" class="loading-screen">
      <h1>⚓ MAELSTROM</h1>
      <p class="subtitle">Pirate Naval Survivor</p>
      <div class="loading-bar">
        <div id="loading-bar-fill" class="loading-bar-fill"></div>
      </div>
      <p id="loading-text" class="loading-text">Loading assets...</p>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
